<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#214;&#287;retmen Paneli ? Kamu Ekonomisi: Siyasi S&#252;re&#231;</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--ink:#1a1a2e;--paper:#f5f0e8;--accent:#c84b31;--accent2:#2d6a4f;--accent3:#457b9d;--muted:#8a8070;--surface:#ede8de;--border:#d4cfc4;}
  body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow:hidden;}
  header{background:var(--ink);color:var(--paper);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  header h1{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
  .live-b{display:flex;align-items:center;gap:6px;font-size:12px;opacity:0.7;}
  .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite;}
  .dot.off{background:#888;animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .layout{display:grid;grid-template-columns:320px 1fr 260px;height:calc(100vh - 48px);}

  /* SOL: Soru seti edit&#246;r&#252; */
  .sol{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
  .sol-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .sol-baslik{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .btn-yeni-soru{padding:6px 12px;border-radius:7px;background:var(--accent2);color:white;border:none;font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;}
  .soru-listesi{flex:1;overflow-y:auto;padding:10px;}
  .soru-kart-mini{background:white;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all 0.15s;position:relative;}
  .soru-kart-mini:hover{border-color:var(--accent2);}
  .soru-kart-mini.aktif{border-color:var(--accent2);background:#e8f5e9;}
  .soru-kart-mini.gonderildi{border-color:var(--accent3);background:#e8f4f8;}
  .skm-ust{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .skm-no{font-size:11px;font-weight:700;color:var(--muted);}
  .skm-tip{font-size:10px;background:var(--surface);border-radius:4px;padding:2px 6px;color:var(--muted);}
  .skm-tip.aktif-tip{background:#d4edda;color:#155724;}
  .skm-soru{font-size:12px;color:var(--ink);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .skm-sil{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;opacity:0;transition:opacity 0.15s;}
  .soru-kart-mini:hover .skm-sil{opacity:1;}
  .sol-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;}
  .btn-basla-set{flex:1;padding:11px;border-radius:9px;background:var(--accent);color:white;border:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-basla-set:hover{background:#a83825;}
  .btn-basla-set:disabled{background:var(--muted);cursor:default;}

  /* ORTA: Aktif soru g&#246;rselle&#351;tirme */
  .orta{display:flex;flex-direction:column;overflow:hidden;}
  .orta-header{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .soru-nav{display:flex;align-items:center;gap:10px;}
  .btn-nav{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;transition:all 0.15s;}
  .btn-nav:hover{background:var(--surface);}
  .btn-nav.ileri{background:var(--accent2);color:white;border-color:var(--accent2);}
  .btn-nav.ileri:hover{background:#1e5438;}
  .btn-nav:disabled{opacity:0.3;cursor:default;}
  .soru-ilerleme{font-size:13px;color:var(--muted);}
  .nav-aksiyonlar{display:flex;gap:8px;}
  .btn-kucuk{padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:white;cursor:pointer;font-size:12px;font-family:'Syne',sans-serif;font-weight:600;transition:all 0.15s;}
  .btn-kucuk:hover{background:var(--surface);}
  .btn-kucuk.analiz{background:linear-gradient(135deg,#2d6a4f,#457b9d);color:white;border:none;}
  .btn-kucuk:disabled{opacity:0.35;cursor:default;}

  .orta-icerik{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
  .aktif-soru-goster{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;border-left:4px solid var(--accent);padding-left:14px;line-height:1.3;}
  .aktif-tip-badge{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:4px;}
  .stats-row{display:flex;gap:10px;}
  .stat{background:white;border:1px solid var(--border);border-radius:9px;padding:10px 14px;flex:1;text-align:center;}
  .stat-n{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;}
  .stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
  .gorsel-kutu{background:white;border:1px solid var(--border);border-radius:12px;padding:18px;min-height:180px;}
  .gorsel-baslik{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:12px;}
  .bulut-alan{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:7px;min-height:140px;}
  .bulut-k{border-radius:5px;padding:3px 9px;animation:wIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes wIn{from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
  .yoklama-bars{display:flex;flex-direction:column;gap:8px;}
  .yb-row{display:flex;align-items:center;gap:8px;}
  .yb-label{font-size:12px;flex:0 0 160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .yb-wrap{flex:1;background:var(--surface);border-radius:5px;height:26px;overflow:hidden;}
  .yb-fill{height:100%;border-radius:5px;transition:width 0.5s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:white;}
  .yb-n{font-size:12px;font-weight:600;flex:0 0 28px;text-align:right;}
  .siralama-sonuc{display:flex;flex-direction:column;gap:7px;}
  .sr-item{background:var(--surface);border-radius:7px;padding:9px 12px;display:flex;align-items:center;gap:8px;}
  .sr-puan{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--accent2);flex:0 0 44px;}
  .sr-text{font-size:12px;flex:1;}
  .sr-bar{height:5px;border-radius:3px;background:var(--accent2);margin-top:3px;transition:width 0.5s;}

  /* Analiz paneli */
  .analiz-panel{background:white;border:1px solid var(--border);border-radius:12px;padding:18px;display:none;}
  .analiz-panel.visible{display:block;}
  .ap-bolum{margin-bottom:16px;}
  .ap-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:8px;}
  .ton-bar{display:flex;height:28px;border-radius:7px;overflow:hidden;}
  .ton-s{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:white;transition:width 0.8s;overflow:hidden;}
  .radar-wrap{max-width:260px;margin:0 auto;}
  .cerceve-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
  .ck{border-radius:7px;padding:10px;border:1px solid var(--border);}
  .ck.eko{background:#e8f4f8;border-color:#457b9d;} .ck.huk{background:#fff3e0;border-color:#e9c46a;} .ck.gun{background:#e8f5e9;border-color:#2d6a4f;}
  .ck .cb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
  .ck.eko .cb{color:#457b9d;} .ck.huk .cb{color:#b5830a;} .ck.gun .cb{color:#2d6a4f;}
  .ck .cn{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;}
  .ck.eko .cn{color:#457b9d;} .ck.huk .cn{color:#b5830a;} .ck.gun .cn{color:#2d6a4f;}
  .ck .co{font-size:10px;color:var(--muted);font-style:italic;margin-top:5px;border-top:1px solid rgba(0,0,0,0.08);padding-top:5px;line-height:1.4;}
  .ped-kutu{background:linear-gradient(135deg,#e8f4f0,#e3edf5);border:1px solid #b8d4c8;border-radius:9px;padding:14px;font-size:12px;line-height:1.7;}
  .yanlis-item{background:#fff5f5;border:1px solid #ffcccc;border-radius:6px;padding:8px 10px;font-size:11px;margin-bottom:5px;line-height:1.5;}
  .yanlis-item strong{color:var(--accent);}

  /* Genel rapor */
  .rapor-panel{background:white;border:1px solid var(--border);border-radius:12px;padding:18px;display:none;}
  .rapor-panel.visible{display:block;}
  .rapor-soru-item{border-bottom:1px solid var(--border);padding:10px 0;}
  .rapor-soru-item:last-child{border-bottom:none;}
  .rsi-soru{font-size:12px;font-weight:600;margin-bottom:4px;}
  .rsi-ozet{font-size:11px;color:var(--muted);line-height:1.5;}

  /* SA&#286;: Sidebar */
  .sag{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
  .sb-bolum{padding:12px 14px;border-bottom:1px solid var(--border);}
  .sb-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:8px;}
  #qrCanvas{display:flex;justify-content:center;margin:5px 0;}
  .join-url{font-size:10px;color:var(--muted);text-align:center;word-break:break-all;line-height:1.5;}
  .resp-list{flex:1;overflow-y:auto;padding:8px 12px;}
  .resp-item{font-size:11px;padding:6px 7px;border-bottom:1px solid var(--border);line-height:1.4;}
  .resp-name{font-weight:600;color:var(--accent2);}
  .resp-text{color:var(--ink);margin-top:1px;font-size:10px;}

  /* Soru edit&#246;r&#252; modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.acik{display:flex;}
  .modal{background:white;border-radius:16px;padding:24px;width:480px;max-height:80vh;overflow-y:auto;}
  .modal-baslik{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
  .modal-kapat{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
  .m-label{font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;}
  .m-input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);resize:none;margin-bottom:12px;}
  .m-input:focus{outline:none;border-color:var(--accent2);}
  .tip-grid-m{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
  .tip-btn-m{padding:9px 5px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;text-align:center;font-size:11px;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
  .tip-btn-m:hover{border-color:var(--accent2);}
  .tip-btn-m.aktif{border-color:var(--accent2);background:#e8f5e9;}
  .tip-emoji-m{font-size:18px;display:block;margin-bottom:3px;}
  .secenek-row{display:flex;gap:6px;margin-bottom:6px;}
  .secenek-inp{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--ink);}
  .secenek-inp:focus{outline:none;border-color:var(--accent);}
  .secenek-sil-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;}
  .btn-secenek-ekle-m{background:none;border:1px dashed var(--border);border-radius:7px;padding:7px;font-size:12px;color:var(--muted);cursor:pointer;width:100%;margin-bottom:12px;}
  .btn-secenek-ekle-m:hover{border-color:var(--accent2);color:var(--accent2);}
  .modal-footer{display:flex;gap:8px;margin-top:4px;}
  .btn-modal-kaydet{flex:1;padding:11px;border-radius:9px;background:var(--accent2);color:white;border:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
  .btn-modal-iptal{padding:11px 16px;border-radius:9px;border:1px solid var(--border);background:white;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;}

  .bos-ekran{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);text-align:center;padding:40px;}
  .bos-ekran-ikon{font-size:40px;margin-bottom:12px;}
  .bos-ekran-text{font-size:14px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <h1>&#214;&#287;retmen Paneli ? Kamu Ekonomisi: Siyasi S&#252;re&#231;</h1>
  <div class="live-b"><div class="dot off" id="liveDot"></div><span id="liveStatus">Bekleniyor</span></div>
</header>

<div class="layout">
  <!-- SOL: Soru seti -->
  <div class="sol">
    <div class="sol-header">
      <div class="sol-baslik">Soru Seti <span id="soruSayac" style="color:var(--accent2)">(0)</span></div>
      <button class="btn-yeni-soru" onclick="yeniSoruModal()">+ Soru Ekle</button>
    </div>
    <div class="soru-listesi" id="soruListesi">
      <div style="text-align:center;padding:30px 16px;color:var(--muted);font-size:13px;">Hen&#252;z soru eklenmedi.<br>+ Soru Ekle butonuna t&#305;klay&#305;n.</div>
    </div>
    <div class="sol-footer">
      <button class="btn-basla-set" id="btnBasla" onclick="oturumBaslat()" disabled>? Oturumu Ba&#351;lat</button>
    </div>
  </div>

  <!-- ORTA: G?rselle?tirme -->
  <div class="orta">
    <div class="orta-header" id="ortaHeader" style="display:none">
      <div class="soru-nav">
        <button class="btn-nav" id="btnGeri" onclick="soruDegistir(-1)" disabled>? Geri</button>
        <span class="soru-ilerleme" id="soruIlerleme">1 / 1</span>
        <button class="btn-nav ileri" id="btnIleri" onclick="soruDegistir(1)">&#304;leri ?</button>
      </div>
      <div class="nav-aksiyonlar">
        <button class="btn-kucuk analiz" id="btnAnaliz" onclick="analizYap()" disabled>? Analiz</button>
        <button class="btn-kucuk" id="btnRapor" onclick="genelRapor()" disabled>? Rapor</button>

      </div>
    </div>
    <div class="orta-icerik" id="ortaIcerik">
      <div class="bos-ekran">
        <div class="bos-ekran-ikon">?</div>
        <div class="bos-ekran-text">Sol taraftan sorular&#305;n&#305;z&#305; ekleyin,<br>ard&#305;ndan oturumu ba&#351;lat&#305;n.</div>
      </div>
    </div>
  </div>

  <!-- SA?: Sidebar -->
  <div class="sag">
    <div class="sb-bolum">
      <div class="sb-label">&#214;&#287;renci Ba&#287;lant&#305;s&#305;</div>
      <div id="qrCanvas"></div>
      <div class="join-url" id="joinUrl"></div>
    </div>
    <div class="sb-label" style="padding:10px 14px 4px">Son Yan&#305;tlar</div>
    <div class="resp-list" id="respList"></div>
  </div>
</div>

<!-- SORU EKLEME MODALI -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-baslik">
      <span id="modalBaslikText">Yeni Soru</span>
      <button class="modal-kapat" onclick="modalKapat()">?</button>
    </div>
    <div class="m-label">Soru T&#252;r&#252;</div>
    <div class="tip-grid-m">
      <button class="tip-btn-m aktif" onclick="mTipSec('tanim',this)"><span class="tip-emoji-m">??</span>Tan&#305;m Yaz</button>
      <button class="tip-btn-m" onclick="mTipSec('yoklama',this)"><span class="tip-emoji-m">?</span>Anlama Kontrol&#252;</button>
      <button class="tip-btn-m" onclick="mTipSec('secmeli',this)"><span class="tip-emoji-m">?</span>&#199;oktan Se&#231;meli</button>
      <button class="tip-btn-m" onclick="mTipSec('siralama',this)"><span class="tip-emoji-m">??</span>S&#305;ralama</button>
      <button class="tip-btn-m" onclick="mTipSec('cagrisim',this)"><span class="tip-emoji-m">?</span>Kelime &#199;a&#287;r&#305;&#351;&#305;m&#305;</button>
      <button class="tip-btn-m" onclick="mTipSec('yansima',this)"><span class="tip-emoji-m">?</span>Ders Sonu Yans&#305;ma</button>
    </div>
    <div class="m-label">Soru Metni</div>
    <textarea class="m-input" id="mSoruText" rows="3" placeholder="Soruyu yaz?n..."></textarea>
    <div id="mSeceneklerAlan" style="display:none">
      <div class="m-label">Se&#231;enekler</div>
      <div id="mSeceneklerListe"></div>
      <button class="btn-secenek-ekle-m" onclick="mSecenekEkle()">+ Se&#231;enek ekle</button>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-iptal" onclick="modalKapat()">&#304;ptal</button>
      <button class="btn-modal-kaydet" onclick="soruKaydet()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const FB={apiKey:'AIzaSyDFwRi7C49WQUjZlJEDEZNtg0Q82B1zeyM',projectId:'vergi-dc18f',databaseURL:'https://vergi-dc18f-default-rtdb.firebaseio.com'};

function soruKaydet(){
  const soru=document.getElementById('mSoruText').value.trim();
  if(!soru){alert('Soru metni yaz&#305;n.');return;}
  const obj={soru,tip:mTip};
  if(mTip==='yoklama'){obj.secenekler=mSecenekler.map(s=>{const p=s.split(' ');return{emoji:p[0],metin:p.slice(1).join(' ')};});}

function oturumBaslat(){
  if(!sorular.length){alert('En az bir soru ekleyin.');return;}
  oturumBasladi=true;
  aktifSoruIdx=0;
  const oturumId='oturum_'+Date.now();

  if(sorular[0].secenekler)sessionData.secenekler=sorular[0].secenekler;
  if(sorular[0].siralama_ogeleri)sessionData.siralama_ogeleri=sorular[0].siralama_ogeleri;
  sessionRef.set(sessionData);
  document.getElementById('liveDot').className='dot';
  document.getElementById('liveStatus').textContent='Canl&#305;';
  document.getElementById('ortaHeader').style.display='flex';
  renderSoruListesi();
  soruGoster(0);

function soruDegistir(yon){
  const yeni=aktifSoruIdx+yon;
  if(yeni<0||yeni>=sorular.length)return;
  aktifSoruIdx=yeni;
  const s=sorular[yeni];
  const update={soruIdx:yeni,question:s.soru,tip:s.tip};
  if(s.secenekler)update.secenekler=s.secenekler;
  if(s.siralama_ogeleri)update.siralama_ogeleri=s.siralama_ogeleri;
  sessionRef.update(update);
  soruGoster(yeni);
  renderSoruListesi();
}
function soruGoster(i){
  aktifSoruIdx=i;
  document.getElementById('soruIlerleme').textContent=(i+1)+' / '+sorular.length;

}

function renderGorselIcerik(s,yanit){
  const tip=s.tip;
  const gIc=document.getElementById('gIcerik');
  const gBas=document.getElementById('gBaslik');
  if(!gIc)return;
  if(tip==='tanim'||tip==='cagrisim'||tip==='yansima'){
    gBas.textContent='Kelime Bulutu';
    const words=aktifKelimeler();
    const entries=Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0,60);
    if(!entries.length){gIc.innerHTML='<div style="color:var(--muted);text-align:center;padding:30px;font-size:13px;">Yan&#305;tlar bekleniyor...</div>';return;}
    const max=entries[0][1];
    gIc.innerHTML='<div class="bulut-alan">'+entries.map(([w,c],i)=>{const size=11+Math.round((c/max)*30);const col=COLORS[i%COLORS.length];return`<span class="bulut-k" style="font-size:${size}px;background:${col.bg};color:${col.c};font-family:'Syne',sans-serif;font-weight:${c>2?'700':'400'}">${w}</span>`}).join('')+'</div>';
  } else if(tip==='yoklama'||tip==='secmeli'){
    gBas.textContent='Canl&#305; Sonu&#231;lar';
    const sayimlar={};yanit.forEach(r=>{sayimlar[r.text]=(sayimlar[r.text]||0)+1;});
    const labellar=tip==='yoklama'?(s.secenekler||[]).map(o=>o.emoji+' '+o.metin):(s.secenekler||[]);
    gIc.innerHTML='<div class="yoklama-bars">'+labellar.map((l,i)=>{const sayi=sayimlar[String(i)]||0;const pct=yanit.length?Math.round(sayi/yanit.length*100):0;return`<div class="yb-row"><div class="yb-label">${escHtml(l)}</div><div class="yb-wrap"><div class="yb-fill" style="width:${pct}%;background:${BAR_COLORS[i%BAR_COLORS.length]}">${pct>12?pct+'%':''}</div></div><div class="yb-n">${sayi}</div></div>`;}).join('')+'</div>';
  } else if(tip==='siralama'){
    gBas.textContent='S&#305;ralama Sonu&#231;lar&#305;';
    if(!yanit.length){gIc.innerHTML='<div style="color:var(--muted);text-align:center;padding:30px;font-size:13px;">Yan&#305;tlar bekleniyor...</div>';return;}
    const ogeler=s.siralama_ogeleri||[];const puanlar={};ogeler.forEach(o=>{puanlar[o]=0;});
    yanit.forEach(r=>{r.text.split('||').forEach((item,idx)=>{if(puanlar[item]!==undefined)puanlar[item]+=(ogeler.length-idx);});});
    const sirali=Object.entries(puanlar).sort((a,b)=>b[1]-a[1]);const maxP=sirali[0]?.[1]||1;
    gIc.innerHTML='<div class="siralama-sonuc">'+sirali.map(([item,p])=>`<div class="sr-item"><div><div class="sr-text">${escHtml(item)}</div><div class="sr-bar" style="width:${Math.round(p/maxP*100)}%"></div></div><div class="sr-puan">${p}</div></div>`).join('')+'</div>';
  }
}

  const ozet=sorular.map((s,i)=>{
    const y=tumYanitlar.filter(r=>r.soruIdx===i);
    return `Soru ${i+1} (${TIP_LABEL[s.tip]}): "${s.soru}" ? ${y.length} yan&#305;t`;
  }).join('\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:`A&#351;a&#287;&#305;daki ders oturumunu analiz et. Her soru i&#231;in k&#305;sa bir de&#287;erlendirme yap ve genel bir pedagojik rapor olu&#351;tur. Sadece JSON d&#246;nd&#252;r:\n\n${ozet}\n\nT&#252;m yan&#305;tlar:\n${tumYanitlar.map(r=>`[S${r.soruIdx+1}] ${r.name}: "${r.text}"`).join('\n')}\n\n{"sorular":[{"no":1,"ozet":"k&#305;sa de&#287;erlendirme","anlasildi":true}],"genel":"genel pedagojik rapor 3-4 c&#252;mle","oneri":"bir sonraki ders i&#231;in &#246;neri"}`}]})});
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    const result=JSON.parse(text.replace(/```json|```/g,'').trim());
    renderRapor(result);
  }catch(e){alert('Rapor hatas&#305;: '+e.message);}
  btn.disabled=false;btn.textContent='? Rapor';
}

function renderRapor(r){
  const panel=document.getElementById('raporPanel');
  if(!panel)return;
  panel.classList.add('visible');
  panel.innerHTML=`<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:12px;">? Genel Oturum Raporu</div>
    ${r.sorular?.map(s=>`<div class="rapor-soru-item"><div class="rsi-soru">Soru ${s.no}: ${s.anlasildi?'?':'??'}</div><div class="rsi-ozet">${escHtml(s.ozet)}</div></div>`).join('')||''}
    <div class="ped-kutu" style="margin-top:12px;"><div style="font-size:10px;font-weight:700;color:#2d6a4f;margin-bottom:5px;">Genel De&#287;erlendirme</div><div style="font-size:12px;line-height:1.7;">${escHtml(r.genel)}</div></div>
    <div style="background:#fff3e0;border:1px solid #ffe082;border-radius:8px;padding:12px;margin-top:8px;font-size:12px;line-height:1.6;"><strong style="font-size:10px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;">&#214;neri</strong>${escHtml(r.oneri)}</div>`;
  panel.scrollIntoView({behavior:'smooth'});
}

// CSV
function csvIndir(){
  if(!tumYanitlar.length)return;
  const satirlar=[['\uFEFFNo','Ad Soyad','Soru No','Soru Metni','Yan&#305;t','T&#252;r','Tarih'],...tumYanitlar.map((r,i)=>[i+1,r.name||'',r.soruIdx!==undefined?r.soruIdx+1:'',sorular[r.soruIdx]?.soru||'',(r.text||'').replace(/"/g,'""'),TIP_LABEL[r.tip]||r.tip||'',r.ts?new Date(r.ts).toLocaleString('tr-TR'):'' ])];
  const csv=satirlar.map(s=>s.map(h=>`"${h}"`).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`ders-oturumu-${new Date().toLocaleDateString('tr-TR').replace(/\./g,'-')}.csv`;
  a.click();
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
