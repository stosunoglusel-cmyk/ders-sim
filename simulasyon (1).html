*{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#1a1a2e;--paper:#f5f0e8;--accent:#c84b31;--accent2:#2d6a4f;--accent3:#457b9d;--muted:#8a8070;--surface:#ede8de;--border:#d4cfc4;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow:hidden;}
header{background:var(--ink);color:var(--paper);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
header h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.live-b{display:flex;align-items:center;gap:6px;font-size:12px;opacity:0.7;}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite;}
.dot.off{background:#888;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.layout{display:grid;grid-template-columns:280px 1fr 240px;height:calc(100vh - 44px);}

/* SOL */
.sol{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden;}
.sol-header{padding:12px 14px;border-bottom:1px solid var(--border);}
.sol-baslik{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.sahne-tab{display:flex;gap:4px;margin-bottom:0;}
.stab{flex:1;padding:7px 4px;border-radius:7px;border:1.5px solid var(--border);background:white;cursor:pointer;text-align:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;transition:all 0.15s;color:var(--muted);}
.stab.aktif{background:var(--ink);color:white;border-color:var(--ink);}
.stab.tamamlandi{background:var(--accent2);color:white;border-color:var(--accent2);}
.sol-icerik{flex:1;overflow-y:auto;padding:12px 14px;}
.sahne-kart{background:white;border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.sk-baslik{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin-bottom:4px;}
.sk-alt{font-size:11px;color:var(--muted);line-height:1.5;}
.rol-item{background:var(--surface);border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.rol-renk{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rol-isim-text{font-size:12px;font-weight:600;flex:1;}
.rol-kisi{font-size:11px;color:var(--muted);}
.sol-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}

/* ORTA */
.orta{display:flex;flex-direction:column;overflow:hidden;}
.orta-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.asama-bilgi{display:flex;align-items:center;gap:10px;}
.asama-badge{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:20px;background:var(--surface);color:var(--muted);}
.asama-badge.aktif{background:var(--accent);color:white;}
.asama-badge.oylama{background:var(--accent3);color:white;}
.asama-badge.kavram{background:var(--accent2);color:white;}
.orta-aksiyonlar{display:flex;gap:6px;}
.btn{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;transition:all 0.15s;color:var(--ink);}
.btn:hover{background:var(--surface);}
.btn.primary{background:var(--accent2);color:white;border-color:var(--accent2);}
.btn.primary:hover{background:#1e5438;}
.btn.danger{background:var(--accent);color:white;border-color:var(--accent);}
.btn.mavi{background:var(--accent3);color:white;border-color:var(--accent3);}
.btn:disabled{opacity:0.35;cursor:default;}
.orta-icerik{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}

/* Soru g&#246;ster */
.buyuk-soru{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;border-left:4px solid var(--accent);padding-left:14px;line-height:1.4;}
.stat-row{display:flex;gap:8px;}
.stat{background:white;border:1px solid var(--border);border-radius:8px;padding:10px 14px;flex:1;text-align:center;}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
.gorsel-kutu{background:white;border:1px solid var(--border);border-radius:10px;padding:14px;}
.gorsel-baslik{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:10px;}
.oy-bars{display:flex;flex-direction:column;gap:8px;}
.ob-row{display:flex;align-items:center;gap:8px;}
.ob-label{font-size:12px;flex:0 0 200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ob-wrap{flex:1;background:var(--surface);border-radius:5px;height:28px;overflow:hidden;}
.ob-fill{height:100%;border-radius:5px;transition:width 0.5s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:white;}
.ob-n{font-size:12px;font-weight:700;flex:0 0 32px;text-align:right;}

/* Rol listesi */
.rol-liste-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.rol-kart-mini{background:white;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;}
.rkm-tip{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px;}
.rkm-isim{font-size:13px;font-weight:600;}
.rkm-kisi{font-size:11px;color:var(--accent2);margin-top:2px;}

/* Kura modal&#305; */
.modal-arka{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-arka.acik{display:flex;}
.modal{background:white;border-radius:16px;padding:24px;width:460px;max-height:80vh;overflow-y:auto;}
.modal-baslik{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;}
.talep-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface);border-radius:7px;margin-bottom:5px;}
.talep-isim{font-size:13px;font-weight:600;}
.kura-input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:8px;font-family:'DM Sans',sans-serif;}
.kura-input:focus{outline:none;border-color:var(--accent2);}
.modal-footer{display:flex;gap:8px;margin-top:14px;}
.btn-kura{flex:1;padding:11px;background:var(--accent2);color:white;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-kapat{padding:11px 16px;background:white;border:1.5px solid var(--border);border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;}

/* Kavram se&#231;ici */
.kavram-secici{display:flex;flex-direction:column;gap:8px;}
.kavram-btn{padding:12px 14px;border-radius:9px;border:1.5px solid var(--border);background:white;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.15s;}
.kavram-btn:hover{border-color:var(--accent2);}
.kavram-btn.secili{border-color:var(--accent2);background:#e8f5e9;}
.kavram-btn strong{display:block;margin-bottom:2px;font-family:'Syne',sans-serif;}

/* SA&#286; */
.sag{border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden;}
.sb-bolum{padding:10px 12px;border-bottom:1px solid var(--border);}
.sb-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:6px;}

.kat-item{font-size:11px;padding:5px 7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.kat-rol{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--muted);}
.kat-isim{flex:1;}

.bos{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);text-align:center;padding:30px;font-size:13px;line-height:1.7;}
</style>
</head>

  });
  renderSolIcerik();
  if(simBasladi) renderOrta();
}

function renderSolIcerik(){
  const s=SAHNELER[aktifSahne];
  const roller=atananRoller[aktifSahne]||{};
  let html=`
    <div class="sahne-kart">
      <div class="sk-baslik">${s.isim}</div>
      <div class="sk-alt">${s.aciklama}</div>
    </div>
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin:8px 0 6px">Roller (${s.roller.length} ki&#351;i)</div>`;
  s.roller.forEach(r=>{
    const atanan=roller[r.id];
    const renkler={politikaci:'#2d6a4f',secmen:'#c84b31',burokrat:'#457b9d'};
    html+=`<div class="rol-item">
      <div class="rol-renk" style="background:${renkler[r.tip]||'#888'}"></div>
      <div style="flex:1">
        <div class="rol-isim-text">${esc(r.isim)}</div>
        <div class="rol-kisi">${atanan?esc(atanan):' ? atanmad&#305;'}</div>
      </div>
    </div>`;
  });
  document.getElementById('solIcerik').innerHTML=html;
}

function simulasyonBaslat(){
  oturumId='sim_'+Date.now();
  simBasladi=true;
  document.getElementById('btnBaslat').style.display='none';
  document.getElementById('btnBitir').style.display='block';
  document.getElementById('btnBitir').disabled=false;
  document.getElementById('liveDot').className='dot';
  document.getElementById('liveStatus').textContent='Canl&#305;';
  sahneBaslat(1);
}

function sahneBaslat(n){
  aktifSahne=n;
  mevcutAsama='rol_dagitim';
  atananRoller[n]=atananRoller[n]||{};
  sahneSecTab(n);
  rolTalepRef.remove();

  simRef.set({
    active:true,oturumId,sahne:n,asama:'rol_dagitim',
    roller:atananRoller[n]&&Object.keys(atananRoller[n]).length>0?buildRollerObj(n):null
  });
  renderOrta();
}

function renderOrta(){
  const s=SAHNELER[aktifSahne];
  const asamaLabels={rol_dagitim:'Rol Da&#287;&#305;t&#305;m&#305;',hazirlik:'Haz&#305;rl&#305;k',sahne:'Sahne Canl&#305;',oylama:'Oylama',kavram:'Kavram'};
  const asamaRenkler={rol_dagitim:'',hazirlik:'',sahne:'aktif',oylama:'oylama',kavram:'kavram'};
  document.getElementById('asamaBadge').textContent=asamaLabels[mevcutAsama]||mevcutAsama;
  document.getElementById('asamaBadge').className='asama-badge '+(asamaRenkler[mevcutAsama]||'');
  document.getElementById('asamaAciklama').textContent=s.isim;

  let aksHtml='';
  if(mevcutAsama==='rol_dagitim'){
    aksHtml=`<button class="btn mavi" onclick="kuraAc()">Kura &#199;ek</button>
             <button class="btn primary" onclick="asamaGec('hazirlik')">Haz&#305;rl&#305;&#287;a Ge&#231;</button>`;
  } else if(mevcutAsama==='hazirlik'){
    aksHtml=`<button class="btn primary" onclick="asamaGec('sahne')">Sahneyi Ba&#351;lat</button>`;
  } else if(mevcutAsama==='sahne'){
    aksHtml=`<button class="btn mavi" onclick="asamaGec('oylama')">Oylama Ba&#351;lat</button>`;
  } else if(mevcutAsama==='oylama'){
    aksHtml=`<button class="btn primary" onclick="asamaGec('kavram')">Kavram&#305; G&#246;ster</button>`;
  } else if(mevcutAsama==='kavram'){
    if(aktifSahne<3){
      aksHtml=`<button class="btn primary" onclick="sahneBaslat(${aktifSahne+1})">Sonraki Sahne</button>`;
    } else {
      aksHtml=`<button class="btn danger" onclick="simulasyonBitir()">Sim&#252;lasyonu Bitir</button>`;
    }
  }
  document.getElementById('aksiyonlar').innerHTML=aksHtml;

  let html='';
  if(mevcutAsama==='rol_dagitim'){
    html+=`<div class="buyuk-soru">${s.isim} ? Rol Da&#287;&#305;t&#305;m&#305;</div>
    <p style="font-size:13px;color:var(--muted);line-height:1.7">${s.aciklama}<br><br>&#214;&#287;renciler telefonda g&#246;n&#252;ll&#252; oldu. "Kura &#199;ek" ile rolleri ata, sonra "Haz&#305;rl&#305;&#287;a Ge&#231;" de.</p>
    <div class="gorsel-kutu">
      <div class="gorsel-baslik">Rol Listesi</div>
      <div class="rol-liste-grid">`;
    const roller=atananRoller[aktifSahne]||{};
    s.roller.forEach(r=>{
      const atanan=roller[r.id]||'?';
      const renkler={politikaci:'#2d6a4f',secmen:'#c84b31',burokrat:'#457b9d'};
      html+=`<div class="rol-kart-mini">
        <div class="rkm-tip" style="color:${renkler[r.tip]}">${r.tip}</div>
        <div class="rkm-isim">${esc(r.isim)}</div>
        <div class="rkm-kisi">${esc(atanan)}</div>
      </div>`;
    });
    html+=`</div></div>`;
  } else if(mevcutAsama==='hazirlik'){
    html+=`<div class="buyuk-soru">${s.isim} ? Haz&#305;rl&#305;k</div>
    <p style="font-size:13px;color:var(--muted);line-height:1.7">Rol alan &#246;&#287;renciler telefonlar&#305;nda g&#246;revlerini okuyor. 2-3 dakika verin. Haz&#305;r olduklar&#305;nda "Sahneyi Ba&#351;lat" deyin.</p>`;
    html+=renderRolListesiHTML();
  } else if(mevcutAsama==='sahne'){
    html+=`<div class="buyuk-soru">${s.isim} ? Canl&#305;</div>
    <p style="font-size:13px;color:var(--muted);line-height:1.7">Sahne oynan&#305;yor. Rol alan &#246;&#287;rencilere s&#246;z verin. Kalan s&#305;n&#305;f izliyor. Haz&#305;r oldu&#287;unuzda "Oylama Ba&#351;lat" deyin.</p>`;
    html+=renderRolListesiHTML();
  } else if(mevcutAsama==='oylama'){
    html+=`<div class="buyuk-soru">${esc(s.oylama_soru)}</div>`;
    html+=`<div class="stat-row">
      <div class="stat"><div class="stat-n" id="toplamOy">0</div><div class="stat-l">Oy Say&#305;s&#305;</div></div>
      <div class="stat"><div class="stat-n" id="katilimYuzde">%0</div><div class="stat-l">Kat&#305;l&#305;m</div></div>
    </div>`;
    html+=`<div class="gorsel-kutu"><div class="gorsel-baslik">Canl&#305; Sonu&#231;lar</div><div class="oy-bars" id="oyBarsDiv"></div></div>`;
  } else if(mevcutAsama==='kavram'){
    const kavramlar=[
      {isim:s.kavram_aday,aciklama:s.kavram_aciklama},
    ];
    html+=`<div class="buyuk-soru">Bu Sahneden Kavram</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Ekranda g&#246;sterilecek kavram&#305; se&#231;in:</p>
    <div class="kavram-secici">`;
    kavramlar.forEach((k,i)=>{
      html+=`<div class="kavram-btn ${seciliKavram===i?'secili':''}" onclick="kavramSec(${i},'${esc(k.isim)}','${esc(k.aciklama)}')">
        <strong>${esc(k.isim)}</strong>${esc(k.aciklama)}
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('ortaIcerik').innerHTML=html;
  if(mevcutAsama==='oylama') renderOylar();
}

function renderRolListesiHTML(){
  const s=SAHNELER[aktifSahne];
  const roller=atananRoller[aktifSahne]||{};
  let html=`<div class="gorsel-kutu"><div class="gorsel-baslik">Aktif Roller</div><div class="rol-liste-grid">`;
  s.roller.forEach(r=>{
    const atanan=roller[r.id]||'?';
    const renkler={politikaci:'#2d6a4f',secmen:'#c84b31',burokrat:'#457b9d'};
    html+=`<div class="rol-kart-mini">
      <div class="rkm-tip" style="color:${renkler[r.tip]}">${r.isim}</div>
      <div class="rkm-kisi">${esc(atanan)}</div>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

function renderOylar(){
  const s=SAHNELER[aktifSahne];
  const secenekler=s.oylama_secenekler||[];
  const sayilar=secenekler.map((_,i)=>oylar.filter(o=>o.oy===i).length);
  const toplam=oylar.length;
  const katSayisi=Object.keys(katilimcilar).length||1;

  const el=document.getElementById('toplamOy');
  if(el) el.textContent=toplam;
  const el2=document.getElementById('katilimYuzde');
  if(el2) el2.textContent='%'+Math.round(toplam/katSayisi*100);

  const barsDiv=document.getElementById('oyBarsDiv');
  if(!barsDiv) return;
  const renkler=['#c84b31','#2d6a4f','#457b9d','#e9c46a'];
  const max=Math.max(...sayilar,1);
  barsDiv.innerHTML=secenekler.map((s2,i)=>`
    <div class="ob-row">
      <div class="ob-label">${esc(s2)}</div>
      <div class="ob-wrap">
        <div class="ob-fill" style="width:${Math.round(sayilar[i]/max*100)}%;background:${renkler[i]}">${sayilar[i]>0?sayilar[i]:''}</div>
      </div>
      <div class="ob-n">${sayilar[i]}</div>
    </div>`).join('');
}

function asamaGec(asama){
  mevcutAsama=asama;
  const s=SAHNELER[aktifSahne];
  const guncelleme={active:true,oturumId,sahne:aktifSahne,asama};
  if(asama==='oylama'){
    guncelleme.oylama_soru=s.oylama_soru;
    guncelleme.oylama_secenekler=s.oylama_secenekler;
  }
  if(asama==='kavram'&&seciliKavram!==null){
    guncelleme.kavram={isim:s.kavram_aday,aciklama:s.kavram_aciklama};
  }
  const roller=buildRollerObj(aktifSahne);
  if(roller) guncelleme.roller=roller;
  simRef.set(guncelleme);
  renderOrta();
}

function kavramSec(i,isim,aciklama){
  seciliKavram=i;
  simRef.update({asama:'kavram',kavram:{isim,aciklama}});
  renderOrta();
}

function simulasyonBitir(){
  simRef.set({active:false,oturumId,sahne:aktifSahne,asama:'bitis'});
  document.getElementById('liveDot').className='dot off';
  document.getElementById('liveStatus').textContent='Bitti';
  document.getElementById('btnBitir').disabled=true;
}

// KURA
function kuraAc(){
  kuraSahne=aktifSahne;
  const s=SAHNELER[kuraSahne];
  rolTalepRef.once('value',snap=>{
    const talepler=Object.values(snap.val()||{});
    const isimler=talepler.map(t=>t.isim).filter(Boolean);
    let html=`<p style="font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.6">G&#246;n&#252;ll&#252; olmayan roller i&#231;in isim yazabilirsin. Kura butonu rastgele atar.</p>`;
    html+=`<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">G&#246;n&#252;ll&#252;ler (${isimler.length})</div>`;
    if(isimler.length){
      isimler.forEach(n=>{html+=`<div class="talep-item"><span class="talep-isim">${esc(n)}</span></div>`;});
    } else {
      html+=`<div style="font-size:12px;color:var(--muted);padding:8px 0">Hen&#252;z g&#246;n&#252;ll&#252; yok.</div>`;
    }
    html+=`<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Roller (${s.roller.length})</div>`;
    s.roller.forEach(r=>{
      const mevcut=atananRoller[kuraSahne]?.[r.id]||'';
      html+=`<div style="margin-bottom:6px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">${esc(r.isim)}</div>
      <input class="kura-input" id="rol_${r.id}" value="${esc(mevcut)}" placeholder="&#304;sim gir veya kura &#231;ek..."/></div>`;
    });
    document.getElementById('kuraIcerik').innerHTML=html;
    document.getElementById('kuraModal').classList.add('acik');

    window._kuraGonulluler=isimler;
  });
}

function kuraYap(){
  const s=SAHNELER[kuraSahne];
  const gonulluler=[...window._kuraGonulluler||[]];
  if(!atananRoller[kuraSahne]) atananRoller[kuraSahne]={};

  s.roller.forEach(r=>{
    const inp=document.getElementById('rol_'+r.id);
    if(inp){
      let val=inp.value.trim();
      if(!val&&gonulluler.length>0){
        const idx=Math.floor(Math.random()*gonulluler.length);
        val=gonulluler.splice(idx,1)[0];
      }
      if(val) atananRoller[kuraSahne][r.id]=val;
    }
  });

  const rollerObj=buildRollerObj(kuraSahne);
  simRef.update({roller:rollerObj});

  s.roller.forEach(r=>{
    const kisi=atananRoller[kuraSahne]?.[r.id];
    if(kisi){
      katilimciRef.child(d2key(kisi)).set({isim:kisi,rol:r.isim,sahne:kuraSahne,ts:Date.now()});
    }
  });

  kuraKapat();
  renderSolIcerik();
  renderOrta();
}

function buildRollerObj(sahne){
  const s=SAHNELER[sahne];
  const atanan=atananRoller[sahne]||{};
  if(!Object.keys(atanan).length) return null;
  const obj={};
  s.roller.forEach(r=>{
    const kisi=atanan[r.id];
    if(kisi) obj[kisi]={...r,kisi};
  });
  return Object.keys(obj).length?obj:null;
}

function kuraKapat(){document.getElementById('kuraModal').classList.remove('acik');}

function renderKatilimcilar(){
  const list=document.getElementById('katList');
  const items=Object.values(katilimcilar);
  document.getElementById('katSayac').textContent='('+items.length+')';
  if(!items.length){list.innerHTML='<div style="padding:12px;font-size:12px;color:var(--muted);text-align:center">Hen&#252;z kimse kat&#305;lmad&#305;</div>';return;}
  const renkler={politikaci:'#2d6a4f',secmen:'#c84b31',burokrat:'#457b9d'};
  list.innerHTML=items.map(k=>`
    <div class="kat-item">
      <div class="kat-rol" style="background:${renkler[k.rol?.toLowerCase()]||'#888'}"></div>
      <div class="kat-isim">${esc(k.isim)}</div>
      <div style="font-size:10px;color:var(--muted)">${esc(k.rol||'se&#231;men')}</div>
    </div>`).join('');
}

function d2key(s){return String(s).replace(/[^a-zA-Z0-9]/g,'_').substring(0,40);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
