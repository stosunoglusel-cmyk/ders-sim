<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SimГғВјlasyon</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#1a1a2e;--paper:#f5f0e8;--accent:#c84b31;--accent2:#2d6a4f;--accent3:#457b9d;--muted:#8a8070;--surface:#ede8de;--border:#d4cfc4;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
header{background:var(--ink);color:var(--paper);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.sahne-badge{font-size:11px;background:var(--accent);color:white;padding:3px 10px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:600;}
.ilerleme{height:3px;background:rgba(255,255,255,0.15);}
.ilerleme-dolu{height:100%;background:#4ade80;transition:width 0.6s;}
.content{padding:20px;max-width:480px;margin:0 auto;}
.merkez{text-align:center;padding:60px 20px;}
.buyuk-ikon{font-size:52px;margin-bottom:16px;}
.bas{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.3;}
.alt{font-size:14px;color:var(--muted);line-height:1.7;}
.rol-kart{background:var(--ink);color:var(--paper);border-radius:16px;padding:20px;margin-bottom:16px;}
.rol-tip{font-size:10px;text-transform:uppercase;letter-spacing:2px;opacity:0.6;margin-bottom:8px;}
.rol-isim{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:10px;}
.rol-aciklama{font-size:13px;opacity:0.85;line-height:1.7;}
.gorev-kutu{background:white;border:2px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:16px;}
.gorev-baslik{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px;}
.gorev-text{font-size:14px;line-height:1.7;color:var(--ink);}
.oy-baslik{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;line-height:1.4;}
.oy-secenekler{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.oy-btn{width:100%;padding:14px 16px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;border:2px solid var(--border);background:white;color:var(--ink);text-align:left;display:flex;align-items:center;gap:12px;transition:all 0.15s;font-weight:500;}
.oy-btn:hover{border-color:var(--accent2);}
.oy-btn.secili{border-color:var(--accent2);background:var(--accent2);color:white;}
.oy-btn.secili .oy-harf{background:rgba(255,255,255,0.25);color:white;}
.oy-harf{width:28px;height:28px;border-radius:7px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.rol-isteme{background:white;border:2px dashed var(--border);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px;}
.rol-isteme-baslik{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:8px;}
.rol-isteme-alt{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
.btn-evet{width:100%;padding:14px;background:var(--accent2);color:white;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.btn-hayir{width:100%;padding:14px;background:white;color:var(--muted);border:2px solid var(--border);border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-gonder{width:100%;padding:15px;background:var(--accent);color:white;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-gonder:disabled{background:var(--muted);cursor:default;}
.izleyici-bilgi{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:16px;font-size:13px;color:var(--muted);text-align:center;line-height:1.6;}
.sahne-bilgi{background:var(--ink);color:var(--paper);border-radius:14px;padding:16px;margin-bottom:16px;}
.sahne-no{font-size:10px;text-transform:uppercase;letter-spacing:2px;opacity:0.6;margin-bottom:6px;}
.sahne-baslik{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px;}
.sahne-alt{font-size:12px;opacity:0.75;line-height:1.6;}
.onay-ekran{text-align:center;padding:40px 20px;}
.onay-ikon{font-size:44px;margin-bottom:14px;}
.onay-bas{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;}
.onay-alt{font-size:13px;color:var(--muted);line-height:1.6;}
.isim-alani{margin-bottom:16px;}
.isim-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:6px;display:block;}
input.isim-inp{width:100%;padding:13px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;background:white;color:var(--ink);}
input.isim-inp:focus{outline:none;border-color:var(--accent2);}
.kavram-kutu{background:linear-gradient(135deg,#1a1a2e,#2d3561);color:white;border-radius:16px;padding:20px;margin-bottom:16px;text-align:center;}
.kavram-etiket{font-size:10px;text-transform:uppercase;letter-spacing:2px;opacity:0.6;margin-bottom:8px;}
.kavram-isim{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:10px;}
.kavram-aciklama{font-size:13px;opacity:0.85;line-height:1.7;}
</style>
</head>
<body>
<header>
  <h1>Kamu Ekonomisi SimГғВјlasyonu</h1>
  <span class="sahne-badge" id="sahneBadge">Bekleniyor</span>
</header>
<div class="ilerleme"><div class="ilerleme-dolu" id="ilerleme" style="width:0%"></div></div>

<div class="content" id="icerik">
  <div class="merkez">
    <div class="buyuk-ikon">ГўВҸВі</div>
    <div class="bas">SimГғВјlasyon bekleniyor</div>
    <div class="alt">ГғвҖ“Г„Еёretmen simГғВјlasyonu baГ…ЕёlatГ„Вұnca ekran deГ„ЕёiГ…Еёecek.</div>
  </div>
</div>

<script>
const FB={apiKey:'AIzaSyDFwRi7C49WQUjZlJEDEZNtg0Q82B1zeyM',projectId:'vergi-dc18f',databaseURL:'https://vergi-dc18f-default-rtdb.firebaseio.com'};
const SAHNE_ISIMLERI={1:'Sahne 1: SeГғВ§men',2:'Sahne 2: PolitikacГ„Вұ',3:'Sahne 3: BГғВјrokrat'};
const ROL_RENK={secmen:'#c84b31',politikaci:'#2d6a4f',burokrat:'#457b9d'};

let db,simRef,oyRef;
let isim='';
let benimRolum=null;
let mevcutDurum=null;
let gonderildi=false;
let rolTalep=false;

window.onload=()=>{
  try{const app=firebase.initializeApp(FB,'sim-ogrenci');db=firebase.database(app);}
  catch(e){db=firebase.database(firebase.app('sim-ogrenci'));}
  simRef=db.ref('simulation');
  oyRef=db.ref('sim_votes');
  simRef.on('value',snap=>{
    const d=snap.val();
    if(!d||!d.active){gosterBekle();return;}
    mevcutDurum=d;
    guncelle(d);
  });
};

function guncelle(d){
  document.getElementById('sahneBadge').textContent=SAHNE_ISIMLERI[d.sahne]||'Sahne';
  document.getElementById('ilerleme').style.width=(d.sahne/3*100)+'%';
  if(!isim){gosterIsimAl(d);return;}
  if(d.asama==='rol_dagitim') gosterRolDagitim(d);
  else if(d.asama==='hazirlik') gosterHazirlik(d);
  else if(d.asama==='sahne') gosterSahne(d);
  else if(d.asama==='oylama') gosterOylama(d);
  else if(d.asama==='kavram') gosterKavram(d);
  else if(d.asama==='bitis') gosterBitis();
}

function gosterBekle(){
  document.getElementById('sahneBadge').textContent='Bekleniyor';
  document.getElementById('icerik').innerHTML=`<div class="merkez"><div class="buyuk-ikon">ГўВҸВі</div><div class="bas">SimГғВјlasyon bekleniyor</div><div class="alt">ГғвҖ“Г„Еёretmen simГғВјlasyonu baГ…ЕёlatГ„Вұnca ekran deГ„ЕёiГ…Еёecek.</div></div>`;
}

function gosterIsimAl(d){
  document.getElementById('icerik').innerHTML=`
    <div class="sahne-bilgi">
      <div class="sahne-no">SimГғВјlasyon BaГ…ЕёlГ„Вұyor</div>
      <div class="sahne-baslik">Kamu Ekonomisinde Siyasi SГғВјreГғВ§</div>
      <div class="sahne-alt">3 sahne oynayacaГ„ЕёГ„Вұz. Her sahnede farklГ„Вұ bir aktГғВ¶rГғВјn gГғВ¶zГғВјnden bakacaksГ„Вұn.</div>
    </div>
    <div class="isim-alani">
      <label class="isim-label">AdГ„Вұn SoyadГ„Вұn</label>
      <input class="isim-inp" id="isimInp" placeholder="Ali YГ„Вұlmaz" maxlength="50"/>
    </div>
    <button class="btn-gonder" onclick="isimKaydet()">KatГ„Вұl</button>`;
}

function isimKaydet(){
  const v=document.getElementById('isimInp')?.value?.trim();
  if(!v){document.getElementById('isimInp')?.focus();return;}
  isim=v;
  if(mevcutDurum) guncelle(mevcutDurum);
}

function gosterRolDagitim(d){
  gonderildi=false;
  const sahneInfo=getSahneInfo(d.sahne);
  const benimRol=d.roller&&d.roller[isim];
  if(benimRol){
    benimRolum=benimRol;
    document.getElementById('icerik').innerHTML=`
      <div class="rol-kart" style="background:${ROL_RENK[benimRol.tip]||'#1a1a2e'}">
        <div class="rol-tip">Senin RolГғВјn</div>
        <div class="rol-isim">${esc(benimRol.isim)}</div>
        <div class="rol-aciklama">${esc(benimRol.aciklama)}</div>
      </div>
      <div class="gorev-kutu">
        <div class="gorev-baslik">GГғВ¶revin</div>
        <div class="gorev-text">${esc(benimRol.gorev)}</div>
      </div>
      <div class="onay-ekran">
        <div class="onay-ikon">ДҹЕёВҺВӯ</div>
        <div class="onay-bas">RolГғВјn belirlendi!</div>
        <div class="onay-alt">ГғвҖ“Г„Еёretmen sahneyi baГ…ЕёlatГ„Вұnca gГғВ¶revin ekranda gГғВ¶rГғВјnecek.</div>
      </div>`;
    return;
  }
  if(rolTalep){
    document.getElementById('icerik').innerHTML=`
      <div class="sahne-bilgi">
        <div class="sahne-no">${SAHNE_ISIMLERI[d.sahne]}</div>
        <div class="sahne-baslik">${sahneInfo.baslik}</div>
        <div class="sahne-alt">${sahneInfo.aciklama}</div>
      </div>
      <div class="onay-ekran">
        <div class="onay-ikon">ГўЕ“вҖ№</div>
        <div class="onay-bas">Talebiniz alГ„ВұndГ„Вұ</div>
        <div class="onay-alt">Kura ГғВ§ekilince rol atanГ„Вұrsa bildirilecek. Atanmazsan seГғВ§men olarak oy kullanacaksГ„Вұn.</div>
      </div>`;
    return;
  }
  document.getElementById('icerik').innerHTML=`
    <div class="sahne-bilgi">
      <div class="sahne-no">${SAHNE_ISIMLERI[d.sahne]}</div>
      <div class="sahne-baslik">${sahneInfo.baslik}</div>
      <div class="sahne-alt">${sahneInfo.aciklama}</div>
    </div>
    <div class="rol-isteme">
      <div class="rol-isteme-baslik">Bu sahnede rol almak ister misin?</div>
      <div class="rol-isteme-alt">GГғВ¶nГғВјllГғВјler arasГ„Вұndan kura ГғВ§ekilecek. SeГғВ§ilmezsen seГғВ§men olarak oy kullanГ„ВұrsГ„Вұn.</div>
      <button class="btn-evet" onclick="rolIste()">Evet, rol almak istiyorum</button>
      <button class="btn-hayir" onclick="rolReddet()">HayГ„Вұr, seГғВ§men olarak katГ„ВұlacaГ„ЕёГ„Вұm</button>
    </div>`;
}

function rolIste(){
  db.ref('sim_rol_talep/'+d2key(isim)).set({isim,ts:Date.now()});
  rolTalep=true;
  if(mevcutDurum) gosterRolDagitim(mevcutDurum);
}
function rolReddet(){
  rolTalep=true;
  benimRolum=null;
  if(mevcutDurum) gosterRolDagitim(mevcutDurum);
}

function gosterHazirlik(d){
  if(benimRolum){
    document.getElementById('icerik').innerHTML=`
      <div class="rol-kart" style="background:${ROL_RENK[benimRolum.tip]||'#1a1a2e'}">
        <div class="rol-tip">Senin RolГғВјn ГўвӮ¬вҖқ HazГ„Вұrlan</div>
        <div class="rol-isim">${esc(benimRolum.isim)}</div>
        <div class="rol-aciklama">${esc(benimRolum.aciklama)}</div>
      </div>
      <div class="gorev-kutu">
        <div class="gorev-baslik">GГғВ¶revin</div>
        <div class="gorev-text">${esc(benimRolum.gorev)}</div>
      </div>
      <div class="izleyici-bilgi">ГғвҖ“Г„Еёretmen sahneyi baГ…Еёlatacak. HazГ„Вұr ol.</div>`;
  } else {
    const sahneInfo=getSahneInfo(d.sahne);
    document.getElementById('icerik').innerHTML=`
      <div class="sahne-bilgi">
        <div class="sahne-no">${SAHNE_ISIMLERI[d.sahne]}</div>
        <div class="sahne-baslik">${sahneInfo.baslik}</div>
        <div class="sahne-alt">${sahneInfo.aciklama}</div>
      </div>
      <div class="izleyici-bilgi">Sen bu sahnede <strong>seГғВ§men</strong> rolГғВјndesin.<br>Sahne baГ…ЕёlayГ„Вұnca oy kullanabileceksin.</div>`;
  }
}

function gosterSahne(d){
  gonderildi=false;
  const sahneInfo=getSahneInfo(d.sahne);
  if(benimRolum){
    document.getElementById('icerik').innerHTML=`
      <div class="rol-kart" style="background:${ROL_RENK[benimRolum.tip]||'#1a1a2e'}">
        <div class="rol-tip">Aktif Rol</div>
        <div class="rol-isim">${esc(benimRolum.isim)}</div>
      </div>
      <div class="gorev-kutu">
        <div class="gorev-baslik">Г…Вһu an ne yapmalГ„ВұsГ„Вұn?</div>
        <div class="gorev-text">${esc(benimRolum.sahne_gorevi||benimRolum.gorev)}</div>
      </div>
      <div class="izleyici-bilgi">ГғвҖ“Г„Еёretmen sana sГғВ¶z verecek. HazГ„Вұr ol.</div>`;
  } else {
    document.getElementById('icerik').innerHTML=`
      <div class="sahne-bilgi">
        <div class="sahne-no">${SAHNE_ISIMLERI[d.sahne]} ГўвӮ¬вҖқ CanlГ„Вұ</div>
        <div class="sahne-baslik">${sahneInfo.baslik}</div>
        <div class="sahne-alt">${sahneInfo.izleyici_bilgi||'Sahneyi izle. Oylama kГ„ВұsmГ„Вұnda gГғВ¶rГғВјГ…ЕёГғВјnГғВј bildirirsin.'}</div>
      </div>
      <div class="izleyici-bilgi">Sahne devam ediyor...<br>Oylama baГ…ЕёlayГ„Вұnca burada gГғВ¶rГғВјnecek.</div>`;
  }
}

function gosterOylama(d){
  if(gonderildi){
    document.getElementById('icerik').innerHTML=`<div class="onay-ekran"><div class="onay-ikon">ГўЕ“вҖҰ</div><div class="onay-bas">Oyunuz alГ„ВұndГ„Вұ</div><div class="onay-alt">SonuГғВ§lar ekranda gГғВ¶steriliyor.</div></div>`;
    return;
  }
  const soru=d.oylama_soru||'Bu kararГ„Вұ doГ„Еёru buldunuz mu?';
  const secenekler=d.oylama_secenekler||['Evet, doГ„Еёru karar','HayГ„Вұr, yanlГ„ВұГ…Её karar','KararsГ„ВұzГ„Вұm'];
  const harfler=['A','B','C','D'];
  let seciliIdx=null;
  document.getElementById('icerik').innerHTML=`
    <div class="sahne-bilgi">
      <div class="sahne-no">Oylama ZamanГ„Вұ</div>
      <div class="sahne-baslik">${esc(soru)}</div>
    </div>
    <div class="oy-secenekler" id="oySecenekler">
      ${secenekler.map((s,i)=>`
        <button class="oy-btn" onclick="oyaSec(${i},this)">
          <span class="oy-harf">${harfler[i]}</span>
          <span>${esc(s)}</span>
        </button>`).join('')}
    </div>
    <button class="btn-gonder" id="oyGonderBtn" onclick="oyGonder()" disabled>Oyumu GГғВ¶nder</button>`;

  window.oyaSec=function(i,el){
    seciliIdx=i;
    document.querySelectorAll('.oy-btn').forEach(b=>b.classList.remove('secili'));
    el.classList.add('secili');
    document.getElementById('oyGonderBtn').disabled=false;
  };
  window.oyGonder=function(){
    if(seciliIdx===null) return;
    const btn=document.getElementById('oyGonderBtn');
    btn.disabled=true;btn.textContent='GГғВ¶nderiliyor...';
    oyRef.push({isim,oy:seciliIdx,sahne:d.sahne,oturumId:d.oturumId||'x',ts:Date.now()});
    gonderildi=true;
    document.getElementById('icerik').innerHTML=`<div class="onay-ekran"><div class="onay-ikon">ГўЕ“вҖҰ</div><div class="onay-bas">Oyunuz alГ„ВұndГ„Вұ</div><div class="onay-alt">SonuГғВ§lar ekranda gГғВ¶steriliyor.</div></div>`;
  };
}

function gosterKavram(d){
  const kavram=d.kavram||{isim:'Kavram',aciklama:'Bu sahneden ГғВ§Г„Вұkan temel fikir.'};
  document.getElementById('icerik').innerHTML=`
    <div class="kavram-kutu">
      <div class="kavram-etiket">Bu Sahneden Kavram</div>
      <div class="kavram-isim">${esc(kavram.isim)}</div>
      <div class="kavram-aciklama">${esc(kavram.aciklama)}</div>
    </div>
    <div class="izleyici-bilgi">ГғвҖ“Г„Еёretmen bir sonraki sahneye geГғВ§ince ekran deГ„ЕёiГ…Еёecek.</div>`;
}

function gosterBitis(){
  document.getElementById('sahneBadge').textContent='Bitti';
  document.getElementById('ilerleme').style.width='100%';
  document.getElementById('icerik').innerHTML=`
    <div class="merkez">
      <div class="buyuk-ikon">ДҹЕёВҺвҖң</div>
      <div class="bas">SimГғВјlasyon tamamlandГ„Вұ</div>
      <div class="alt">ГғЕ“ГғВ§ aktГғВ¶rГғВј de deneyimledin.<br>SeГғВ§men, politikacГ„Вұ, bГғВјrokrat ГўвӮ¬вҖқ hepsi kendi sisteminde rasyonel davrandГ„Вұ.<br><br>Peki sistem neden yine de aksaklГ„Вұk ГғВјretiyor?</div>
    </div>`;
}

function getSahneInfo(sahne){
  const bilgi={
    1:{baslik:'SeГғВ§men Sahnesi',aciklama:'Г„В°ki aday var. 30 saniyede oy kullanacaksГ„Вұn.',izleyici_bilgi:'AdaylarГ„Вұ dinle. KararГ„ВұnГ„Вұ ver.'},
    2:{baslik:'PolitikacГ„Вұ Sahnesi',aciklama:'SeГғВ§ilmiГ…Её temsilciler bГғВјtГғВ§e kararГ„Вұ alГ„Вұyor.',izleyici_bilgi:'KararlarГ„Вұ izle. Oylama kГ„ВұsmГ„Вұnda deГ„Еёerlendir.'},
    3:{baslik:'BГғВјrokrat Sahnesi',aciklama:'BakanlГ„Вұklar bГғВјtГғВ§e kГ„ВұsГ„ВұntГ„ВұsГ„Вұnda masaya oturuyor.',izleyici_bilgi:'Kim kendi bГғВјtГғВ§esinden kesiyor? Г„В°zle ve deГ„Еёerlendir.'}
  };
  return bilgi[sahne]||{baslik:'Sahne',aciklama:'',izleyici_bilgi:''};
}

function d2key(s){return s.replace(/[^a-zA-Z0-9Г„ЕёГғВјГ…ЕёГ„ВұГғВ¶ГғВ§Г„ВһГғЕ“Г…ВһГ„В°ГғвҖ“ГғвҖЎ]/g,'_').substring(0,30)+'_'+Date.now()%10000;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
